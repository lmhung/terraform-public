#cloud-config
package_update: true
package_upgrade: true
packages:
  - openssh-server
  - systemd-resolved
  - nftables
  - apt-transport-https
  - curl

users:
  - name: hung
    groups: sudo
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
    ssh_authorized_keys:
      - <YOUR_SSH_PUBLIC_KEY>

write_files:
  - path: /etc/systemd/network/10-eth0.network
    content: |
      [Match]
      Name=eth0
      [Network]
      Address=${container_ip}
      Gateway=${gateway_ip}
      DNS=1.1.1.1
      DNS=9.9.9.9
      DNS=8.8.8.8
      DNSDefaultRoute=yes

  - path: /etc/systemd/resolved.conf.d/public-dns.conf
    content: |
      [Resolve]
      DNS=1.1.1.1 9.9.9.9
      FallbackDNS=8.8.8.8 8.8.4.4
      DNSStubListener=yes
      Domains=~.

  - path: /etc/nftables.conf
    content: |
      #!/usr/sbin/nft -f
      flush ruleset

      table inet filter {
        chain input {
          type filter hook input priority filter; policy drop;
          ct state established,related accept
          iif "lo" accept
          meta l4proto { icmp, ipv6-icmp } accept
          tcp dport { 22, 80, 443 } accept
          tcp dport 8883 accept
        }
      }

runcmd:
  - mkdir -p /etc/systemd/resolved.conf.d
  - ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf
  - systemctl enable systemd-networkd
  - systemctl start systemd-networkd
  - systemctl enable systemd-resolved
  - systemctl start systemd-resolved
  - systemctl enable nftables
  - systemctl start nftables
  - systemctl enable ssh
  - systemctl start ssh
  # Add Caddy official repo and install
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - apt-get install -y caddy
  # Write Caddyfile now that /etc/caddy/ exists
  - mkdir -p /etc/caddy
  - |
    tee /etc/caddy/Caddyfile << 'CADDYEOF'
    {
            layer4 {
                    :443 {
                            @mail tls sni mail.fieldandrecord.com mta-sts.fieldandrecord.com webmail.fieldandrecord.com mta-sts.minhhung.net
                            route @mail {
                                    close
                            }
                            @ssh ssh
                            route @ssh {
                                    proxy ${docker_host_ip}:222 {
                                            proxy_protocol v1
                                    }
                            }
                            route {
                                    proxy ${docker_host_ip}:443 {
                                            proxy_protocol v2
                                    }
                            }
                    }
                    :8883 {
                            route {
                                    proxy ${docker_host_ip}:8883 {
                                            proxy_protocol v2
                                    }
                            }
                    }
            }
    }
    CADDYEOF
  # Add layer4 module then restart
  - caddy add-package github.com/mholt/caddy-l4
  - systemctl enable caddy
  - systemctl restart caddy
  # Install ddclient non-interactively then write config
  - DEBIAN_FRONTEND=noninteractive apt-get install -y ddclient
  - |
    tee /etc/ddclient.conf << 'DDCEOF'
    verbose=yes
    usev6=ifv6,ifv6=eth0
    protocol=cloudflare
    zone=fieldandrecord.com
    login=token
    password='${cloudflare_token}'
    *.fieldandrecord.com
    DDCEOF
  - chmod 600 /etc/ddclient.conf
  - systemctl enable ddclient
  - systemctl start ddclient
